name: Build Varius OS 15 GSI

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android Version'
        required: true
        default: '15'
        type: choice
        options:
        - 15
      gsi_variant:
        description: 'GSI Variant'
        required: true
        default: 'tdgsi_arm64_ab'
        type: choice
        options:
        - tdgsi_arm64_ab
      include_gapps:
        description: 'Include Core GApps? Play Store'
        required: true
        default: 'yes'  # <-- DEFAULT YES
        type: choice
        options:
        - yes  # Core GApps
        - no   # Vanilla

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Set GApps
      id: gapps
      run: |
        if [ "${{ github.event.inputs.include_gapps }}" == "yes" ]; then
          echo "variant=core" >> $GITHUB_OUTPUT
        else
          echo "variant=none" >> $GITHUB_OUTPUT
        fi
        
    - name: Build GSI
      uses: ponces/treble_build_aosp@v2
      with:
        android_version: ${{ github.event.inputs.android_version }}
        gsi_variant: ${{ github.event.inputs.gsi_variant }}
        gapps_variant: ${{ steps.gapps.outputs.variant }}
        
    - name: Upload GSI
      uses: actions/upload-artifact@v4
      with:
        name: Varius-OS-15-${{ steps.gapps.outputs.variant }}-${{ github.run_number }}
        path: release/
