name: Build Varius OS 15 GSI

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android Version'
        required: true
        default: '15'
        type: choice
        options:
        - 15
      gsi_variant:
        description: 'GSI Variant'
        required: true
        default: 'tdgsi_arm64_ab'
        type: choice
        options:
        - tdgsi_arm64_ab
        - tdgsi_arm64_a
        - tdgsi_arm_ab

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Build GSI
      uses: ponces/treble_build_aosp@android-15.0
      with:
        android_version: ${{ github.event.inputs.android_version }}
        gsi_variant: ${{ github.event.inputs.gsi_variant }}
        
    - name: Upload GSI
      uses: actions/upload-artifact@v4
      with:
        name: Varius-OS-15-${{ github.run_number }}
        path: release/
